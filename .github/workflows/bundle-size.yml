name: Bundle Size

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  bundle-size:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build bundles for size check
        run: npm run build:size

      - name: Print gzipped sizes
        run: |
          echo "Core (bytes): $(gzip -c dist/core/index.js | wc -c)"
          echo "React (bytes): $(gzip -c dist/react/index.js | wc -c)"

      - name: Enforce bundlesize limits
        run: npm run size:check
